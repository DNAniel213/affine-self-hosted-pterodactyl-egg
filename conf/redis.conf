# =============================================================================
# Redis configuration for AFFiNE Pterodactyl bundled mode.
#
# This config is designed for single-container use alongside AFFiNE.
# Redis listens only on loopback — it is NOT accessible outside the container.
# Data is persisted to /home/container/redis-data (set at startup via --dir).
# =============================================================================

# Only accept connections from localhost (inside the same container)
bind 127.0.0.1

# Standard Redis port — AFFiNE default is 6379
port 6379

# Run in foreground. The start.sh script launches Redis with --daemonize yes,
# overriding this. This setting just makes the config file safe to use standalone.
daemonize no

# Minimal logging — visible in /home/container/redis.log
loglevel notice

# 16 database slots. AFFiNE uses databases n through n+4 where n = REDIS_SERVER_DATABASE (default 0).
databases 16

# Persistence: light RDB snapshots.
# Saves after 900s if 1+ key changed, 300s if 10+ changed, 60s if 10000+ changed.
save 900 1
save 300 10
save 60 10000

# Do not use AOF (append-only file) — RDB is sufficient for cache/session use.
appendonly no

# Set a reasonably high max memory to prevent OOM in a constrained container.
# The actual limit is enforced at the Pterodactyl server level, not Redis.
# Comment this out if you have plenty of RAM.
maxmemory 256mb

# When maxmemory is hit, evict least-recently-used keys from volatile keys first.
# This protects persistent data while allowing cache eviction.
maxmemory-policy volatile-lru
