name: Build & Push Docker Images

on:
  push:
    branches:
      - main
    paths:
      - "Dockerfile"
      - "conf/**"
  workflow_dispatch:
    inputs:
      tags:
        description: "Comma-separated AFFiNE tags to build (e.g. stable,beta,canary)"
        required: false
        default: "stable,beta,canary"

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build ${{ matrix.affine_tag }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        affine_tag: [stable, beta, canary]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compute lowercase image name
        id: image
        run: echo "name=${REGISTRY}/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/affine-pterodactyl" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=${{ matrix.affine_tag }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            AFFINE_TAG=${{ matrix.affine_tag }}
          tags: ${{ steps.image.outputs.name }}:${{ matrix.affine_tag }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.affine_tag }}
          cache-to: type=gha,mode=max,scope=${{ matrix.affine_tag }}
